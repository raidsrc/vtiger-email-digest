on: [push]

jobs:
  start-mongo:
    runs-on: ubuntu-latest
    name: job that starts mongo server 
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: start mongo 
        uses: supercharge/mongodb-github-action@1.12.1

      - name: mongoimport 
        run: mongoimport testing_seed.json
      

